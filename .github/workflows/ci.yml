name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # 后端：pytest（FastAPI + 状态机 + 仓储 + 可观测）
  # --------------------------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run pytest
        run: python -m pytest backend/tests -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"

  # --------------------------------------------------------------------------
  # 前端：vitest + vite build（产出 dist 体积报告）
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + Build
        run: npm run build

      - name: Run vitest
        run: npm run test

      - name: Report bundle size
        run: |
          echo "### Bundle size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzip |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.css dist/assets/*.js; do
            [ -f "$f" ] || continue
            raw=$(wc -c < "$f")
            gz=$(gzip -c "$f" | wc -c)
            echo "| \`$(basename "$f")\` | $((raw / 1024)) KB | $((gz / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          done

  # --------------------------------------------------------------------------
  # 部署清单校验：docker-compose 配置语法 + Dockerfile 静态检查
  # --------------------------------------------------------------------------
  deploy-lint:
    name: Deploy artifacts lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose config --quiet
          echo "✅ docker-compose.yml syntax OK"

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          ignore: DL3008,DL3013

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3008,DL3018
